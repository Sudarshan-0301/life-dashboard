<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Track — Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--s:#0f1523;--s2:#161d2e;--s3:#1c2538;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);
  --t:#e8ecf4;--t2:#a8b2c8;--m:#5a6480;
  --c1:#4f8eff;--c2:#ff5f7e;--c3:#00e5a0;--c4:#ffb340;--c5:#bf7fff;
  --g1:rgba(79,142,255,0.12);--g2:rgba(255,95,126,0.12);
  --g3:rgba(0,229,160,0.12);--g4:rgba(255,179,64,0.12);--g5:rgba(191,127,255,0.12);
  --sidebar:220px;--radius:14px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--t);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;padding:0}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--b)}
.sb-logo-text{font-family:'Unbounded',sans-serif;font-size:0.9rem;font-weight:900;letter-spacing:-0.02em}
.sb-logo-text span{background:linear-gradient(135deg,var(--c1),var(--c5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-logo-sub{font-size:10px;color:var(--m);margin-top:2px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:10px}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--c1),var(--c5));display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:800;color:white;flex-shrink:0}
.sb-user-info{min-width:0}
.sb-user-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-type{font-size:10px;color:var(--m);margin-top:1px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--m);padding:8px 8px 6px;margin-top:4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:2px;text-decoration:none;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:var(--s2);color:var(--t)}
.sb-item.active{background:var(--g1);color:var(--c1);font-weight:600}
.sb-item.active .sb-icon{color:var(--c1)}
.sb-item[data-color="green"].active{background:var(--g3);color:var(--c3)}
.sb-item[data-color="red"].active{background:var(--g2);color:var(--c2)}
.sb-item[data-color="orange"].active{background:var(--g4);color:var(--c4)}
.sb-item[data-color="purple"].active{background:var(--g5);color:var(--c5)}
.sb-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7}
.sb-item.active .sb-icon,.sb-item:hover .sb-icon{opacity:1}
.sb-badge{margin-left:auto;background:var(--c2);color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px}
.sb-bottom{padding:12px 10px;border-top:1px solid var(--b)}
.sb-signout{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--m);font-size:12px;font-weight:500;border:none;background:none;width:100%;transition:all 0.15s}
.sb-signout:hover{color:var(--c2);background:var(--g2)}
</style>

<style>
/* ===== MAIN CONTENT ===== */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;overflow-y:auto;position:relative;z-index:1}
.topbar{padding:16px 28px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.page-title{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:800;letter-spacing:-0.02em}
.topbar-right{display:flex;align-items:center;gap:12px}
.time-badge{background:var(--s);border:1px solid var(--b);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;color:var(--m);font-weight:500}
.time-badge span{color:var(--c3);font-weight:700}
.content{padding:24px 28px}

/* ===== CARDS ===== */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric-card{background:var(--s);border:1px solid var(--b);border-radius:var(--radius);padding:18px 20px;transition:border-color 0.2s,transform 0.15s;position:relative;overflow:hidden}
.metric-card:hover{border-color:var(--b2);transform:translateY(-1px)}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--radius) var(--radius) 0 0}
.metric-card.c1::before{background:var(--c1)}
.metric-card.c2::before{background:var(--c2)}
.metric-card.c3::before{background:var(--c3)}
.metric-card.c4::before{background:var(--c4)}
.metric-card.c5::before{background:var(--c5)}
.metric-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--m);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.metric-value{font-family:'Unbounded',sans-serif;font-size:1.6rem;font-weight:800;line-height:1;letter-spacing:-0.02em}
.metric-value.c1{color:var(--c1)}.metric-value.c2{color:var(--c2)}.metric-value.c3{color:var(--c3)}.metric-value.c4{color:var(--c4)}.metric-value.c5{color:var(--c5)}
.metric-sub{font-size:11px;color:var(--m);margin-top:6px}
.metric-trend{font-size:10px;margin-top:4px;font-weight:600}
.metric-trend.up{color:var(--c3)}.metric-trend.down{color:var(--c2)}.metric-trend.neutral{color:var(--m)}

/* ===== SCORE RING ===== */
.score-section{display:grid;grid-template-columns:200px 1fr;gap:20px;margin-bottom:20px}
.score-ring-card{background:var(--s);border:1px solid var(--b);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring-wrap{position:relative;width:120px;height:120px}
.score-ring-wrap svg{transform:rotate(-90deg)}
.score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring-num{font-family:'Unbounded',sans-serif;font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-ring-label{font-size:9px;color:var(--m);text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.score-ring-title{font-family:'Unbounded',sans-serif;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--m);margin-top:14px;margin-bottom:4px}
.score-ring-msg{font-size:11px;color:var(--t2);text-align:center;line-height:1.5}

/* ===== MODULE SCORES ===== */
.module-scores{background:var(--s);border:1px solid var(--b);border-radius:var(--radius);padding:20px}
.module-scores-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--m);margin-bottom:16px}
.module-score-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.module-score-row:last-child{margin-bottom:0}
.module-score-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.module-score-name{font-size:12px;font-weight:600;min-width:70px}
.module-score-bar{flex:1;height:5px;background:var(--s2);border-radius:100px;overflow:hidden}
.module-score-fill{height:100%;border-radius:100px;transition:width 0.5s ease}
.module-score-val{font-size:11px;font-weight:700;min-width:40px;text-align:right;color:var(--t2)}

/* ===== PANEL CONTAINERS ===== */
.panel{display:none;animation:fadeUp 0.3s ease both}
.panel.active{display:block}
.panel-header{margin-bottom:20px}
.panel-title{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:-0.02em}
.panel-sub{font-size:12px;color:var(--m);margin-top:4px}

/* ===== CARDS ===== */
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--m);margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
@media(max-width:700px){.three-col{grid-template-columns:1fr 1fr}.metrics-row{grid-template-columns:1fr 1fr}.score-section{grid-template-columns:1fr}.sidebar{display:none}.main{margin-left:0}}

/* ===== FORM ELEMENTS ===== */
.form-group{margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--m);display:block;margin-bottom:6px}
input,select,textarea{background:var(--s2);border:1px solid var(--b);border-radius:var(--radius-sm);padding:10px 14px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:var(--t);outline:none;transition:border-color 0.2s,background 0.2s;width:100%}
input::placeholder,textarea::placeholder{color:var(--m)}
input:focus,select:focus,textarea:focus{border-color:var(--c1);background:var(--s3)}
select option{background:var(--s2)}
.input-row{display:grid;gap:10px;margin-bottom:12px}
.input-row.cols2{grid-template-columns:1fr 1fr}
.input-row.cols3{grid-template-columns:1fr 1fr 1fr}
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:none;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.02em;display:inline-flex;align-items:center;gap:8px}
.btn:hover{opacity:0.88;transform:translateY(-1px)}
.btn-full{width:100%;justify-content:center}
.btn-primary{background:var(--c1);color:white}
.btn-success{background:var(--c3);color:#000}
.btn-warning{background:var(--c4);color:#000}
.btn-danger{background:var(--c2);color:white}
.btn-purple{background:var(--c5);color:white}
.btn-ghost{background:var(--s2);color:var(--t2);border:1px solid var(--b)}
.btn-ghost:hover{border-color:var(--b2);color:var(--t)}
.toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.toggle-btn{padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--b);background:transparent;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;color:var(--m);text-align:center}
.toggle-btn.active-inc{border-color:var(--c3);background:var(--g3);color:var(--c3)}
.toggle-btn.active-exp{border-color:var(--c2);background:var(--g2);color:var(--c2)}

/* ===== LOG ITEMS ===== */
.log-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;padding-right:4px}
.log-list::-webkit-scrollbar{width:3px}
.log-list::-webkit-scrollbar-track{background:transparent}
.log-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}
.log-item{background:var(--s2);border:1px solid var(--b);border-radius:var(--radius-sm);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color 0.15s}
.log-item:hover{border-color:var(--b2)}
.log-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-meta{font-size:11px;color:var(--m);margin-top:2px;display:flex;align-items:center;gap:6px}
.log-val{font-family:'Unbounded',sans-serif;font-size:0.85rem;font-weight:700;flex-shrink:0;white-space:nowrap}
.val-pos{color:var(--c3)}.val-neg{color:var(--c2)}
.del-btn{background:none;border:none;color:var(--m);cursor:pointer;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all 0.15s;flex-shrink:0;font-size:14px}
.del-btn:hover{color:var(--c2);background:var(--g2)}
.empty-state{text-align:center;padding:32px 20px;color:var(--m)}
.empty-state-icon{width:40px;height:40px;margin:0 auto 12px;opacity:0.3}
.empty-state-text{font-size:13px}

/* ===== TAGS ===== */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600}
.tag-b{background:rgba(255,179,64,0.15);color:var(--c4)}
.tag-l{background:rgba(0,229,160,0.15);color:var(--c3)}
.tag-d{background:rgba(79,142,255,0.15);color:var(--c1)}
.tag-s{background:rgba(255,95,126,0.15);color:var(--c2)}
.tag-high{background:rgba(255,95,126,0.15);color:var(--c2)}
.tag-med{background:rgba(255,179,64,0.15);color:var(--c4)}
.tag-low{background:rgba(0,229,160,0.15);color:var(--c3)}

/* ===== TASK ITEMS ===== */
.task-item{background:var(--s2);border:1px solid var(--b);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all 0.15s;margin-bottom:6px}
.task-item:hover{border-color:var(--b2)}
.task-item.done{opacity:0.45}
.check-circle{width:20px;height:20px;border-radius:50%;border:2px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;color:transparent;font-size:10px}
.check-circle.checked{background:var(--c1);border-color:var(--c1);color:white}
.task-name{font-weight:500;font-size:13px;flex:1}
.task-name.done-text{text-decoration:line-through}
.task-time{font-size:11px;color:var(--m);display:flex;align-items:center;gap:4px}

/* ===== PROGRESS ===== */
.progress-bar{background:var(--s2);border-radius:100px;height:5px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width 0.6s ease}
.completion-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.completion-pct{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:800;color:var(--c1)}

/* ===== SUBJECT CARDS ===== */
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.subject-card{background:var(--s2);border:1px solid var(--b);border-radius:var(--radius);padding:14px 16px}
.subject-card:hover{border-color:var(--b2)}
.subject-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.subject-name{font-weight:700;font-size:13px}
.subject-code{font-size:10px;color:var(--m);margin-top:2px}
.subject-pct{font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:800}
.zone-safe{color:var(--c3)}.zone-watch{color:var(--c4)}.zone-danger{color:var(--c2)}.zone-crit{color:#ff3333}
.zone-pill{display:inline-block;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;margin-top:6px}
.zp-s{background:rgba(0,229,160,0.12);color:var(--c3)}.zp-w{background:rgba(255,179,64,0.12);color:var(--c4)}.zp-d{background:rgba(255,95,126,0.12);color:var(--c2)}.zp-c{background:rgba(255,51,51,0.12);color:#ff3333}
.att-row{display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-top:6px}

/* ===== GOAL CARDS ===== */
.goal-card{background:var(--s2);border:1px solid var(--b);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px}
.goal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.goal-title-text{font-weight:600;font-size:13px}
.goal-cat-text{font-size:10px;color:var(--m);margin-top:2px}
.goal-pct-text{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:800;color:var(--c5)}
.goal-deadline{font-size:10px;color:var(--m);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ===== MOOD ===== */
.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.mood-btn{background:var(--s2);border:2px solid var(--b);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:600;color:var(--m)}
.mood-btn:hover{border-color:var(--b2);color:var(--t)}
.mood-btn.sel{border-color:var(--c5);background:var(--g5);color:var(--c5)}

/* ===== SETTINGS ===== */
.settings-section{margin-bottom:24px}
.settings-section-title{font-family:'Unbounded',sans-serif;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--m);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.type-grid-s{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.type-card-s{background:var(--s2);border:2px solid var(--b);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:12px;font-weight:600;color:var(--m)}
.type-card-s:hover{border-color:var(--b2);color:var(--t)}
.type-card-s.sel{border-color:var(--c1);background:var(--g1);color:var(--c1)}
.type-card-s .tc-icon{display:block;margin-bottom:4px;opacity:0.7}
.module-toggle-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.module-toggle{background:var(--s2);border:2px solid var(--b);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s}
.module-toggle:hover{border-color:var(--b2)}
.module-toggle.sel{border-color:var(--c3);background:var(--g3)}
.module-toggle.sel .mt-check{background:var(--c3);border-color:var(--c3);color:#000}
.mt-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all 0.2s}
.mt-label{font-size:12px;font-weight:600}
.danger-zone{border:1px solid rgba(255,95,126,0.25);border-radius:var(--radius);padding:16px;background:rgba(255,95,126,0.04)}
.danger-zone-title{font-size:11px;font-weight:700;color:var(--c2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
.danger-zone-desc{font-size:12px;color:var(--m);margin-bottom:12px;line-height:1.5}

/* ===== ONBOARD SCREEN ===== */
.ob-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.ob-card{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:36px;max-width:500px;width:100%}
.ob-step{display:none}.ob-step.act{display:block}
.dots{display:flex;gap:5px;margin-bottom:28px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--b2);transition:all 0.3s}
.dot.cur{background:var(--c1);width:20px;border-radius:3px}
.dot.ok{background:var(--c3)}
.ob-title{font-family:'Unbounded',sans-serif;font-size:1.15rem;font-weight:800;margin-bottom:6px}
.ob-sub{color:var(--m);font-size:12px;margin-bottom:24px;line-height:1.6}
.ob-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.ob-type-card{background:var(--s2);border:2px solid var(--b);border-radius:var(--radius-sm);padding:16px 12px;text-align:center;cursor:pointer;transition:all 0.2s}
.ob-type-card:hover{border-color:var(--b2)}
.ob-type-card.sel{border-color:var(--c1);background:var(--g1)}
.ob-type-card .otc-icon{display:flex;justify-content:center;margin-bottom:8px;opacity:0.8}
.ob-type-card.sel .otc-icon{opacity:1}
.ob-type-card .otc-label{font-weight:700;font-size:12px}
.ob-type-card .otc-sub{font-size:10px;color:var(--m);margin-top:2px}
.ob-mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}

.ob-input:focus{border-color:var(--c1)}

.ob-btn-row{display:flex;align-items:center;gap:8px;margin-top:16px}
.ob-btn-row .btn{flex:1;justify-content:center}
.ob-back{background:none;border:1px solid var(--b);color:var(--m);border-radius:var(--radius-sm);padding:10px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.ob-back:hover{border-color:var(--b2);color:var(--t)}
.subject-add-row{display:flex;gap:7px;margin-bottom:10px}
.subject-add-row input{margin-bottom:0}
.subject-list-preview{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:140px;overflow-y:auto}
.subject-list-item{display:flex;align-items:center;justify-content:space-between;background:var(--s3);border:1px solid var(--b);border-radius:6px;padding:8px 12px;font-size:12px}

/* ===== AUTH SCREEN ===== */
.auth-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;background:var(--bg)}

.auth-logo{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:900;margin-bottom:6px}
.auth-logo span{background:linear-gradient(135deg,var(--c1),var(--c5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.auth-tagline{color:var(--m);font-size:12px;margin-bottom:32px;line-height:1.6}
.google-btn{background:white;color:#222;border:none;padding:13px 24px;border-radius:var(--radius-sm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center;transition:all 0.2s}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}

<script>
// HELPERS
const svg = id => `<svg class="sb-icon" style="width:14px;height:14px;flex-shrink:0"><use href="#i-${id}"/></svg>`;
const bigSvg = (id,size=20) => `<svg style="width:${size}px;height:${size}px"><use href="#i-${id}"/></svg>`;

// TIME
function tick(){
  const n = new Date();
  document.getElementById('tLive').innerHTML =
    n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'}) +
    ' <span>' + n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) + '</span>';
}
tick(); setInterval(tick,1000);

// PANEL SWITCHER
function showPanel(id, el) {
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  const titles = {home:'Dashboard',money:'Money',habits:'Habits',food:'Food & Nutrition',study:'Study & Academics',goals:'Goals',fitness:'Fitness',mood:'Mood Journal',settings:'Settings'};
  document.getElementById('pageTitle').textContent = titles[id] || id;
  const content = document.getElementById('mainContent');
  const panels = {home:homePanel,money:moneyPanel,habits:habitsPanel,food:foodPanel,study:studyPanel,goals:goalsPanel,fitness:fitnessPanel,mood:moodPanel,settings:settingsPanel};
  content.innerHTML = (panels[id] || (() => '<p>Coming soon</p>'))();
  // Render charts after DOM insert
  if(id==='home') setTimeout(renderHomeCharts,50);
  if(id==='money') setTimeout(renderSpendChart,50);
  if(id==='study') setTimeout(renderStudyChart,50);
}

// ===== HOME PANEL =====
function homePanel(){
  return `
  <div class="metrics-row">
    <div class="metric-card c3">
      <div class="metric-label">${svg('money')} Balance Today</div>
      <div class="metric-value c3">&#8377;4,760</div>
      <div class="metric-sub">Income &#8377;5,000 &middot; Spent &#8377;240</div>
      <div class="metric-trend up">&#8593; Saved 95% of income</div>
    </div>
    <div class="metric-card c1">
      <div class="metric-label">${svg('check')} Habits Done</div>
      <div class="metric-value c1">3/6</div>
      <div class="metric-sub">50% completion today</div>
      <div class="metric-trend neutral">3 tasks remaining</div>
    </div>
    <div class="metric-card c5">
      <div class="metric-label">${svg('book')} Est. CGPA</div>
      <div class="metric-value c5">6.84</div>
      <div class="metric-sub">Target 7.0 &middot; 2 at risk</div>
      <div class="metric-trend down">&#8595; FM &amp; EMA need attention</div>

      <div class="metric-trend neutral">760 kcal remaining</div>
    </div>
  </div>
  <div class="score-section">
    <div class="score-ring-card">
      <div class="score-ring-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="48" stroke="rgba(255,255,255,0.06)" stroke-width="10" fill="none"/>
          <circle cx="60" cy="60" r="48" stroke="url(#scoreGrad)" stroke-width="10" fill="none"
            stroke-dasharray="${2*Math.PI*48}" stroke-dashoffset="${2*Math.PI*48*(1-0.56)}" stroke-linecap="round"/>
          <defs><linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f8eff"/><stop offset="100%" stop-color="#bf7fff"/></linearGradient></defs>
        </svg>
        <div class="score-ring-text">
          <div class="score-ring-num">56</div>
          <div class="score-ring-label">/ 100</div>
        </div>
      </div>
      <div class="score-ring-title">Today's Score</div>
      <div class="score-ring-msg">Good start! Keep going</div>
    </div>
    <div class="module-scores">
      <div class="module-scores-title">Module Breakdown</div>
      ${[
        {name:'Money',icon:'money',val:20,max:20,color:'var(--c3)'},
        {name:'Habits',icon:'check',val:20,max:40,color:'var(--c1)'},
        {name:'Goals',icon:'target',val:19,max:19,color:'var(--c2)'},
        {name:'Food',icon:'food',val:14,max:21,color:'var(--c4)'},
        {name:'Fitness',icon:'pulse',val:0,max:20,color:'var(--c3)'},
        {name:'Mood',icon:'smile',val:0,max:10,color:'var(--c5)'},
      ].map(m=>`
        <div class="module-score-row">
          <div class="module-score-icon" style="background:rgba(255,255,255,0.05)">${bigSvg(m.icon,14)}</div>

          <div class="module-score-bar"><div class="module-score-fill" style="width:${(m.val/m.max*100)||0}%;background:${m.color}"></div></div>
          <div class="module-score-val">${m.val}/${m.max}</div>
        </div>`).join('')}

  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Spending — Last 7 Days</div>
      <div class="chart-wrap"><canvas id="homeSpendChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Today's Tasks</div>
      ${['Attend FM lecture','Submit KDM assignment','Study EMA — 1 hour','Log expenses','Drink 3L water','Sleep by 11 PM'].map((t,i)=>`
        <div class="task-item ${i<3?'done':''}">
          <div class="check-circle ${i<3?'checked':''}">${i<3?'&#10003;':''}</div>
          <div class="task-name ${i<3?'done-text':''}">${t}</div>
        </div>`).join('')}

  </div>`;
}

function renderHomeCharts(){
  const ctx = document.getElementById('homeSpendChart');
  if(!ctx) return;
  new Chart(ctx.getContext('2d'),{
    type:'bar',
    data:{
      labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
      datasets:[{label:'Spent',data:[240,180,320,90,410,680,150],backgroundColor:'rgba(79,142,255,0.7)',borderRadius:6,borderWidth:0}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5a6480',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#5a6480',font:{size:11}}}}}
  });
}

// ===== MONEY PANEL =====
function moneyPanel(){
  return `
  <div class="metrics-row">

function renderSpendChart(){
  const ctx = document.getElementById('spendPie');
  if(!ctx) return;
  new Chart(ctx.getContext('2d'),{
    type:'doughnut',

    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#5a6480',font:{size:11},boxWidth:10}}}}
  });

// ===== HABITS PANEL =====
function habitsPanel(){
  const tasks = [
    {n:'Attend FM lecture',t:'8:45 AM',cat:'College',done:true},
    {n:'Attend KDM lecture',t:'9:40 AM',cat:'College',done:true},
    {n:'EMA Lab',t:'10:50 AM',cat:'College',done:true},
    {n:'Submit FM assignment',t:'11:45 AM',cat:'College',done:false},
    {n:'Study EMA — write practice answers',t:'8:00 PM',cat:'Study',done:false},
    {n:'Save &#8377;1000 from payment',t:'',cat:'Finance',done:false},
  ];
  const done = tasks.filter(t=>t.done).length;
  const pct = Math.round(done/tasks.length*100);
  return `
  <div class="card">
    <div class="completion-header">
      <div>
        <div class="card-title">Day Completion</div>
        <div style="font-size:12px;color:var(--t2);margin-top:2px">${done} of ${tasks.length} tasks done today</div>
      </div>
      <div class="completion-pct">${pct}%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--c1),var(--c5))"></div></div>
  </div>
  <div class="two-col">
    <div class="card">

      <div class="card-title">Today's Tasks</div>

        <div class="task-item ${t.done?'done':''}">

// ===== FOOD PANEL =====

    <div class="metric-card c1"><div class="metric-label">${svg('pulse')} Protein</div><div class="metric-value c1">${prot}g</div><div class="metric-sub">/ 60g goal</div></div>
    <div class="metric-card c3"><div class="metric-label">${svg('check')} Meals</div><div class="metric-value c3">${meals}</div><div class="metric-sub">today</div></div>
  </div>
  <div class="card">
    <div class="card-title">Calorie Progress</div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--m);margin-bottom:8px"><span>${cal} kcal consumed</span><span>${goal-cal} kcal remaining</span></div>
    <div class="progress-bar" style="height:10px"><div class="progress-fill" style="width:${Math.round(cal/goal*100)}%;background:linear-gradient(90deg,var(--c4),var(--c2))"></div></div>

      </div>
      <div class="form-group"><label class="form-label">What did you eat?</label><input type="text" placeholder="e.g. Dal rice, 2 rotis, chai"/></div>
      <div class="input-row cols2">
        <div class="form-group"><label class="form-label">Calories (kcal)</label><input type="number" placeholder="0"/></div>
        <div class="form-group"><label class="form-label">Protein (g)</label><input type="number" placeholder="0"/></div>
      </div>
      <button class="btn btn-warning btn-full">Log Meal</button>
    </div>
    <div class="card">
      <div class="card-title">Today's Meals</div>
      ${[
        {name:'Paneer chapati + dal rice',type:'Lunch',cal:780,prot:32,time:'1:00 PM'},
        {name:'Burger + fries',type:'Dinner',cal:460,prot:16,time:'9:00 PM'},

        <div class="log-item">
          <div style="flex:1;min-width:0">

// ===== STUDY PANEL =====
function studyPanel(){
  const subjects = [
    {short:'FM',name:'Fluid Mechanics',avg:25,att:5,total:17},
    {short:'KDM',name:'Kinematics & Dynamics',avg:50,att:9,total:21},
    {short:'EMA',name:'Engg Materials',avg:25,att:7,total:21},
    {short:'M&M',name:'Measurement & Metrology',avg:37,att:6,total:22},
    {short:'EM',name:'Electrical Machines',avg:40,att:11,total:23},
    {short:'SCIL',name:'Prof Skills',avg:null,att:9,total:21},
  ];
  function zone(p){if(p===null)return{l:'No Data',c:'zp-w',t:'zone-watch'};if(p>=60)return{l:'Safe',c:'zp-s',t:'zone-safe'};if(p>=45)return{l:'Watch',c:'zp-w',t:'zone-watch'};if(p>=30)return{l:'Danger',c:'zp-d',t:'zone-danger'};return{l:'Critical',c:'zp-c',t:'zone-crit'};}
  return `
  <div class="two-col" style="margin-bottom:16px">
    <div class="metric-card c5"><div class="metric-label">${svg('book')} Est. CGPA</div><div class="metric-value c5">6.84</div><div class="metric-sub">Target 7.0+</div><div class="metric-trend down">&#8595; Below target</div></div>
    <div class="metric-card c2"><div class="metric-label">${svg('target')} At Risk</div><div class="metric-value c2">4</div><div class="metric-sub">subjects below 45%</div><div class="metric-trend down">FM, EMA critical</div></div>
  </div>
  <div class="subject-grid">
    ${subjects.map(s=>{const z=zone(s.avg),ap=Math.round(s.att/s.total*100);return`
      <div class="subject-card">
        <div class="subject-head">
          <div><div class="subject-name">${s.short}</div><div class="subject-code">${s.name}</div></div>
          <div class="subject-pct ${z.t}">${s.avg!==null?s.avg+'%':'--'}</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${s.avg||0}%;background:${s.avg>=60?'var(--c3)':s.avg>=45?'var(--c4)':'var(--c2)'}"></div></div>
        <div class="att-row"><span>Attendance: ${ap}%</span><span>${s.att}/${s.total} classes</span></div>
        <div class="zone-pill ${z.c}">${z.l}</div>
      </div>`}).join('')}
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Update Marks</div>
      <div class="form-group"><label class="form-label">Subject</label>
        <select>${subjects.map(s=>`<option>${s.short} — ${s.name}</option>`).join('')}</select>
      </div>
      <div class="input-row cols3">
        <div class="form-group"><label class="form-label">Scored</label><input type="number" placeholder="0"/></div>
        <div class="form-group"><label class="form-label">Out Of</label><input type="number" placeholder="30"/></div>
        <div class="form-group"><label class="form-label">Type</label><select><option>Midterm</option><option>Unit Test</option><option>Assignment</option><option>Practical</option><option>End Sem</option></select></div>
      </div>
      <button class="btn btn-purple btn-full">Update Marks</button>
    </div>
    <div class="card">
      <div class="card-title">Subject Performance</div>
      <div class="chart-wrap"><canvas id="studyBar"></canvas></div>
    </div>
  </div>`;
}

function renderStudyChart(){
  const ctx = document.getElementById('studyBar');
  if(!ctx) return;
  const data = [25,50,25,37,40,0];
  new Chart(ctx.getContext('2d'),{
    type:'bar',
    data:{labels:['FM','KDM','EMA','M&M','EM','SCIL'],datasets:[{data,backgroundColor:data.map(d=>d>=60?'rgba(0,229,160,0.8)':d>=45?'rgba(255,179,64,0.8)':'rgba(255,95,126,0.8)'),borderRadius:6,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5a6480',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#5a6480',font:{size:11}}}}}
  });
}

      </div>

    </div>
    <div>
      ${goals.map(g=>`
        <div class="goal-card">
          <div class="goal-head">
            <div><div class="goal-title-text">${g.t}</div><div class="goal-cat-text">${g.cat}</div></div>
            <div style="display:flex;align-items:center;gap:8px">
              <div class="goal-pct-text">${g.p}%</div>
              <button class="del-btn">${bigSvg('x',12)}</button>

            <div class="goal-deadline">${svg('cal')} ${g.dl}</div>
            <input type="range" min="0" max="100" value="${g.p}" style="width:90px;accent-color:var(--c5);cursor:pointer"/>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}
